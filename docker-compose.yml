version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - auth-service
      - intelligence-service
      - alert-service
    networks:
      - ntews-network

  # Auth Service
  auth-service:
    build: ./backend/auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ntews_auth
    depends_on:
      - postgres
    networks:
      - ntews-network

  # Intelligence Service
  intelligence-service:
    build: ./backend/intelligence-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      - kafka
      - mongodb
      - redis
    networks:
      - ntews-network

  # Ingestion Service
  ingestion-service:
    build: ./backend/ingestion-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - ntews-network

  # Prediction Service
  prediction-service:
    build: ./backend/prediction-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - ai-engine
    networks:
      - ntews-network

  # Alert Service
  alert-service:
    build: ./backend/alert-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - ntews-network

  # AI Engine
  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./ai-engine:/app
    networks:
      - ntews-network

  # Frontend Dashboard
  frontend:
    build: ./frontend-dashboard
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - ntews-network

  # PostgreSQL
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=ntews
      - POSTGRES_USER=ntews_user
      - POSTGRES_PASSWORD=ntews_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-layer/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ntews-network

  # MongoDB
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=ntews_user
      - MONGO_INITDB_ROOT_PASSWORD=ntews_password
      - MONGO_INITDB_DATABASE=ntews
    volumes:
      - mongodb_data:/data/db
      - ./data-layer/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - ntews-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./data-layer/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ntews-network

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ntews-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - ntews-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  ntews-network:
    driver: bridge
